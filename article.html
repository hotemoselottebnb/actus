<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Article – Actus 88</title>

<meta name="robots" content="noindex,follow">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f1ea;
color:#2b2b2b;
}

.topbar{
background:#8b1e2d;
padding:14px 20px;
color:white;
}

.topbar-inner{
max-width:900px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.topbar-back{
color:white;
text-decoration:none;
font-weight:bold;
}

.cta-location{
background:white;
color:#8b1e2d !important;
padding:10px 16px;
border-radius:10px;
font-weight:bold;
text-decoration:none;
}

.cta-location:hover{
background:#f5e6e9;
}

.container{
max-width:900px;
margin:auto;
padding:28px 20px 60px;
}

h1{
font-size:2rem;
margin-bottom:20px;
}

.hero-image{
width:100%;
max-height:460px;
object-fit:cover;
border-radius:18px;
margin-bottom:24px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.content{
background:white;
border-radius:18px;
padding:28px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
line-height:1.8;
font-size:1.05rem;
}

.content h2,
.content h3{
margin-top:30px;
color:#8b1e2d;
}

.content h2 a,
.content h3 a{
color:#8b1e2d;
text-decoration:none;
}

.content h2 a:hover,
.content h3 a:hover{
text-decoration:underline;
}

.content img{
max-width:100%;
border-radius:14px;
margin:24px auto;
display:block;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.back{
display:inline-block;
margin-bottom:18px;
text-decoration:none;
color:#8b1e2d;
font-weight:bold;
}

.error{
background:white;
border-radius:18px;
padding:24px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="topbar">

<div class="topbar-inner">

<a href="./" class="topbar-back">
← Retour aux Actus 88
</a>

<a href="https://www.flatshaker.fr/hotemoselottebnb"
target="_blank"
rel="noopener noreferrer"
class="cta-location">
Voir nos locations
</a>

</div>

</div>

<main class="container">

<a class="back" href="./">
← Revenir à la liste des articles
</a>

<div id="article">
Chargement de l’article…
</div>

</main>

<script>

function getParam(name){

const url = new URL(window.location.href);
return url.searchParams.get(name);

}

function absolutizeUrl(url){

if(!url) return "";

if(url.startsWith("http")) return url;

if(url.startsWith("/"))
return "https://www.flatshaker.fr"+url;

return "https://www.flatshaker.fr/"+url;

}

function cleanContent(contentNode){

contentNode.querySelectorAll(
"script,style,nav,header,footer,form,button,aside"
).forEach(el=>el.remove());

contentNode.querySelectorAll(
'a[href*="/blog/auteurs/"],a[href*="/blog/categories/"],a[href*="/blog/mots-cles/"]'
).forEach(el=>{

const p=el.closest("p,div,li,span");

if(p) p.remove();
else el.remove();

});

}

function fixImages(contentNode){

contentNode.querySelectorAll("img").forEach(img=>{

let src=img.getAttribute("src");

if(!src) return;

img.src=absolutizeUrl(src);

});

}

function fixLinks(contentNode){

contentNode.querySelectorAll("a").forEach(a=>{

let href=a.getAttribute("href");

if(!href) return;

if(href.startsWith("#")) return;

a.href=absolutizeUrl(href);

a.target="_blank";
a.rel="noopener noreferrer";

});

}

function linkEventTitles(contentNode){

const headings=contentNode.querySelectorAll("h2,h3");

headings.forEach(h=>{

if(h.querySelector("a")) return;

let next=h.nextElementSibling;
let found=null;

while(next){

if(next.matches("h2,h3")) break;

const imgLink=next.querySelector("a img");

if(imgLink){

const link=imgLink.closest("a");

if(link && link.href){

found=link.href;
break;

}

}

next=next.nextElementSibling;

}

if(found){

const text=h.textContent.trim();

h.innerHTML=
'<a href="'+found+'" target="_blank">'+text+'</a>';

}

});

}

async function loadArticle(){

const articleUrl=getParam("url");

if(!articleUrl){

document.getElementById("article").innerHTML=
'<div class="error">Aucun article indiqué.</div>';

return;

}

try{

const res=await fetch(articleUrl);
const html=await res.text();

const doc=new DOMParser().parseFromString(html,"text/html");

const title=
doc.querySelector('meta[property="og:title"]')?.content
|| doc.querySelector("h1")?.innerText
|| "Article";

const hero=
doc.querySelector('meta[property="og:image"]')?.content
|| "";

let sourceNode=
doc.querySelector("article")
|| doc.querySelector("main")
|| doc.querySelector(".blog-post")
|| doc.body;

let contentNode=sourceNode.cloneNode(true);

cleanContent(contentNode);

fixImages(contentNode);

fixLinks(contentNode);

linkEventTitles(contentNode);

document.title=title+" – Actus 88";

document.getElementById("article").innerHTML=`

<h1>${title}</h1>

${hero?'<img class="hero-image" src="'+hero+'">':""}

<div class="content">

${contentNode.innerHTML}

</div>

`;

}

catch(e){

document.getElementById("article").innerHTML=
'<div class="error">Impossible de charger cet article.</div>';

}

}

loadArticle();

</script>

</body>
</html>
