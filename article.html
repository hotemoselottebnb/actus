<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Article – Actus 88</title>
<meta name="robots" content="noindex,follow">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f1ea;
  color:#2b2b2b;
}

.topbar{
  background:#8b1e2d;
  color:white;
  padding:18px 20px;
}

.topbar a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:28px 20px 50px;
}

h1{
  font-size:2rem;
  margin-bottom:20px;
  line-height:1.2;
}

.hero-image{
  width:100%;
  max-height:460px;
  object-fit:cover;
  border-radius:18px;
  margin-bottom:24px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.content{
  background:white;
  border-radius:18px;
  padding:28px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  line-height:1.8;
  font-size:1.05rem;
}

.content h2,.content h3{
  margin-top:28px;
  color:#8b1e2d;
}

.content img{
  max-width:100%;
  border-radius:12px;
  display:block;
  margin:20px auto;
  height:auto;
}

.content a{
  color:#8b1e2d;
  word-break:break-word;
}

.back{
  display:inline-block;
  margin-bottom:18px;
  text-decoration:none;
  color:#8b1e2d;
  font-weight:bold;
}

.error{
  background:white;
  border-radius:18px;
  padding:24px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.event-image-link{
  display:block;
  margin:20px auto;
  text-align:center;
}

.event-image-link img{
  max-width:100%;
  border-radius:12px;
  display:block;
  margin:0 auto;
  height:auto;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="./">← Retour aux Actus 88</a>
</div>

<main class="container">
  <a class="back" href="./">← Revenir à la liste des articles</a>
  <div id="article">Chargement de l’article…</div>
</main>

<script>
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function absolutizeUrl(url){
  if(!url) return "";
  url = url.trim();

  if(url.startsWith("http://") || url.startsWith("https://")) return url;
  if(url.startsWith("//")) return "https:" + url;
  if(url.startsWith("/")) return "https://www.flatshaker.fr" + url;

  return "https://www.flatshaker.fr/" + url.replace(/^\.?\//, "");
}

function extractFromSrcset(srcset){
  if(!srcset) return "";
  return srcset.split(",")[0].trim().split(" ")[0];
}

function extractImageUrlFromElement(el){
  if(!el) return "";

  if(el.tagName === "IMG"){
    return (
      el.getAttribute("src") ||
      el.getAttribute("data-src") ||
      el.getAttribute("data-lazy-src") ||
      el.getAttribute("data-image") ||
      el.getAttribute("data-original") ||
      extractFromSrcset(el.getAttribute("srcset")) ||
      ""
    );
  }

  if(el.tagName === "SOURCE"){
    return (
      el.getAttribute("src") ||
      el.getAttribute("srcset") ||
      ""
    );
  }

  const style = el.getAttribute("style") || "";
  const match = style.match(/background-image\s*:\s*url\((['"]?)(.*?)\1\)/i);
  if(match && match[2]) return match[2];

  return "";
}

function removeMetaBlocks(contentNode){
  contentNode.querySelectorAll(
    "script,style,nav,header,footer,form,button,aside"
  ).forEach(el => el.remove());

  contentNode.querySelectorAll(
    '.blog-post-meta,.post-meta,.entry-meta,.article-meta,.meta,.author,.post-author,.categories,.post-categories,.tags,.post-tags'
  ).forEach(el => el.remove());

  contentNode.querySelectorAll(
    'a[href*="/blog/auteurs/"],a[href*="/blog/categories/"]'
  ).forEach(el => {
    const parent = el.closest("p,div,span,li");
    if(parent) parent.remove();
    else el.remove();
  });

  contentNode.querySelectorAll("div,p,span,li").forEach(el => {
    const txt = (el.textContent || "").trim();

    const isMetaBlock =
      txt.includes("📅") ||
      txt.includes("👤") ||
      txt.includes("📁") ||
      txt.includes("🗓") ||
      txt.includes("Hôte-Moselotte bnb") ||
      txt === "Évènements" ||
      txt === "Evènements";

    if(isMetaBlock && txt.length < 150){
      el.remove();
    }
  });
}

function fixNormalImages(contentNode){
  contentNode.querySelectorAll("img").forEach(img => {
    const src =
      img.getAttribute("src") ||
      img.getAttribute("data-src") ||
      img.getAttribute("data-lazy-src") ||
      img.getAttribute("data-image") ||
      img.getAttribute("data-original") ||
      extractFromSrcset(img.getAttribute("srcset"));

    if(src){
      img.src = absolutizeUrl(src);
    }

    img.removeAttribute("srcset");
    img.removeAttribute("loading");
    img.removeAttribute("data-src");
    img.removeAttribute("data-lazy-src");
    img.removeAttribute("data-original");
  });

  contentNode.querySelectorAll("source").forEach(source => {
    source.remove();
  });

  contentNode.querySelectorAll("picture").forEach(pic => {
    const img = pic.querySelector("img");
    if(img){
      pic.replaceWith(img);
    }
  });
}

function convertBackgroundImages(contentNode){
  const candidates = contentNode.querySelectorAll("[style*='background-image']");

  candidates.forEach(el => {
    const imgUrl = extractImageUrlFromElement(el);
    if(!imgUrl) return;

    const absoluteImg = absolutizeUrl(imgUrl);

    let wrapper = document.createElement("div");
    wrapper.className = "event-image-link";

    let image = document.createElement("img");
    image.src = absoluteImg;
    image.alt = "";

    const closestLink = el.closest("a");
    if(closestLink && closestLink.getAttribute("href")){
      let a = document.createElement("a");
      a.href = absolutizeUrl(closestLink.getAttribute("href"));
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.appendChild(image);
      wrapper.appendChild(a);
    } else {
      wrapper.appendChild(image);
    }

    if(el.children.length === 0 || (el.textContent || "").trim().length < 5){
      el.replaceWith(wrapper);
    }
  });
}

function convertJsonImageObjectLinks(contentNode){
  contentNode.querySelectorAll("a").forEach(a => {
    const txt = (a.textContent || "").trim();

    if(!txt.startsWith("{") || !txt.includes('"@type":"ImageObject"')) return;

    try {
      const data = JSON.parse(txt);
      const imgUrl = data.url;
      if(!imgUrl) return;

      const realLink = a.getAttribute("href");
      const wrapper = document.createElement("a");
      wrapper.className = "event-image-link";
      wrapper.href = absolutizeUrl(realLink);
      wrapper.target = "_blank";
      wrapper.rel = "noopener noreferrer";

      const img = document.createElement("img");
      img.src = absolutizeUrl(imgUrl);
      img.alt = data.caption || data.name || "";

      wrapper.appendChild(img);
      a.replaceWith(wrapper);
    } catch(e) {
      // on ignore si le texte n'est finalement pas un JSON valide
    }
  });
}

function fixLinks(contentNode){
  contentNode.querySelectorAll("a").forEach(a => {
    const href = a.getAttribute("href");
    if(!href) return;

    if(
      href.startsWith("#") ||
      href.startsWith("mailto:") ||
      href.startsWith("tel:")
    ){
      return;
    }

    a.href = absolutizeUrl(href);
    a.target = "_blank";
    a.rel = "noopener noreferrer";
  });
}

async function loadArticle(){
  const articleUrl = getParam("url");

  if(!articleUrl){
    document.getElementById("article").innerHTML =
      '<div class="error">Aucun article indiqué.</div>';
    return;
  }

  try{
    const res = await fetch(articleUrl);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, "text/html");

    const title =
      doc.querySelector('meta[property="og:title"]')?.content ||
      doc.querySelector("h1")?.innerText ||
      "Article";

    const heroImage =
      doc.querySelector('meta[property="og:image"]')?.content || "";

    let sourceNode =
      doc.querySelector("article") ||
      doc.querySelector("main") ||
      doc.querySelector(".blog-post") ||
      doc.querySelector(".post-content") ||
      doc.body;

    if(!sourceNode){
      document.getElementById("article").innerHTML =
        '<div class="error">Contenu introuvable.</div>';
      return;
    }

    let contentNode = sourceNode.cloneNode(true);

    removeMetaBlocks(contentNode);
    fixNormalImages(contentNode);
    convertBackgroundImages(contentNode);
    convertJsonImageObjectLinks(contentNode);
    fixLinks(contentNode);

    document.title = title + " – Actus 88";

    document.getElementById("article").innerHTML = `
      <h1>${title}</h1>
      ${heroImage ? `<img class="hero-image" src="${heroImage}" alt="${title}">` : ""}
      <div class="content">${contentNode.innerHTML}</div>
    `;
  } catch(e){
    document.getElementById("article").innerHTML =
      '<div class="error">Impossible de charger cet article.</div>';
  }
}

loadArticle();
</script>

</body>
</html>
