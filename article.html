<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Article – Actus 88</title>
  <meta name="robots" content="noindex,follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #2b2b2b;
    }

    .topbar {
      background: #8b1e2d;
      color: white;
      padding: 18px 20px;
    }

    .topbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 50px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero-image {
      width: 100%;
      max-height: 460px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .content {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .content h2,
    .content h3 {
      margin-top: 28px;
      color: #8b1e2d;
    }

    .content p {
      margin: 0 0 16px;
    }

    .content img {
      max-width: 100%;
      border-radius: 14px;
      display: block;
      margin: 24px auto;
      height: auto;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .content a {
      color: #8b1e2d;
      word-break: break-word;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #8b1e2d;
      font-weight: bold;
    }

    .error {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .hidden-broken {
      display: none !important;
    }

    .event-link-button {
      display: inline-block;
      background: #8b1e2d;
      color: #fff !important;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: bold;
      margin: 10px 0 18px;
    }

    .broken-image-wrapper {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="./">← Retour aux Actus 88</a>
  </div>

  <main class="container">
    <a class="back" href="./">← Revenir à la liste des articles</a>
    <div id="article">Chargement de l’article…</div>
  </main>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function absolutizeUrl(url) {
      if (!url) return "";
      url = url.trim();

      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("//")) return "https:" + url;
      if (url.startsWith("/")) return "https://www.flatshaker.fr" + url;

      return "https://www.flatshaker.fr/" + url.replace(/^\.?\//, "");
    }

    function extractFromSrcset(srcset) {
      if (!srcset) return "";
      return srcset.split(",")[0].trim().split(" ")[0];
    }

    function removeMetaBlocks(contentNode) {
      contentNode.querySelectorAll(
        "script,style,nav,header,footer,form,button,aside"
      ).forEach(el => el.remove());

      contentNode.querySelectorAll(
        '.blog-post-meta,.post-meta,.entry-meta,.article-meta,.meta,.author,.post-author,.categories,.post-categories,.tags,.post-tags'
      ).forEach(el => el.remove());

      contentNode.querySelectorAll(
        'a[href*="/blog/auteurs/"],a[href*="/blog/categories/"]'
      ).forEach(el => {
        const parent = el.closest("p,div,span,li");
        if (parent) parent.remove();
        else el.remove();
      });

      contentNode.querySelectorAll("div,p,span,li").forEach(el => {
        if (el.querySelector("img")) return;

        const txt = (el.textContent || "").trim();

        const isMetaBlock =
          txt.includes("📅") ||
          txt.includes("👤") ||
          txt.includes("📁") ||
          txt.includes("🗓") ||
          txt.includes("Hôte-Moselotte bnb") ||
          txt === "Évènements" ||
          txt === "Evènements";

        if (isMetaBlock && txt.length < 150) {
          el.remove();
        }
      });
    }

    function fixImages(contentNode) {
      contentNode.querySelectorAll("img").forEach(img => {
        let src =
          img.getAttribute("src") ||
          img.getAttribute("data-src") ||
          img.getAttribute("data-lazy-src") ||
          img.getAttribute("data-original") ||
          img.getAttribute("data-image") ||
          extractFromSrcset(img.getAttribute("srcset"));

        if (!src) return;

        src = absolutizeUrl(src);

        img.src = src;
        img.removeAttribute("srcset");
        img.removeAttribute("loading");
        img.removeAttribute("data-src");
        img.removeAttribute("data-lazy-src");
        img.removeAttribute("data-original");
        img.removeAttribute("data-image");

        img.onerror = function () {
          const link = img.closest("a");
          const figure = img.closest("figure");
          const wrapper = img.parentElement;

          if (link) link.classList.add("broken-image-wrapper");
          if (figure) figure.classList.add("broken-image-wrapper");
          if (wrapper && wrapper !== link && wrapper !== figure) {
            wrapper.classList.add("broken-image-wrapper");
          }

          img.classList.add("hidden-broken");
        };
      });

      contentNode.querySelectorAll("source").forEach(source => source.remove());

      contentNode.querySelectorAll("picture").forEach(pic => {
        const img = pic.querySelector("img");
        if (img) {
          pic.replaceWith(img);
        }
      });
    }

    function fixLinks(contentNode) {
      contentNode.querySelectorAll("a").forEach(a => {
        const href = a.getAttribute("href");
        if (!href) return;

        if (
          href.startsWith("#") ||
          href.startsWith("mailto:") ||
          href.startsWith("tel:")
        ) {
          return;
        }

        a.href = absolutizeUrl(href);
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });
    }

    function styleExternalLinks(contentNode) {
      contentNode.querySelectorAll("a").forEach(a => {
        const href = a.getAttribute("href") || "";
        const hasImage = !!a.querySelector("img");

        if (href.startsWith("http") && !hasImage) {
          const txt = (a.textContent || "").trim();

          if (
            txt &&
            txt.length < 120 &&
            !txt.includes("flatshaker.fr") &&
            !txt.includes("hotemoselottebnb.fr")
          ) {
            a.classList.add("event-link-button");
            if (!a.textContent.trim().toLowerCase().includes("site")) {
              a.textContent = "Voir le site officiel";
            }
          }
        }
      });
    }

    function cleanupEmptyWrappers(contentNode) {
      contentNode.querySelectorAll("a, p, div, figure").forEach(el => {
        const hasVisibleImg = !!el.querySelector("img:not(.hidden-broken)");
        const text = (el.textContent || "").trim();

        if (!hasVisibleImg && text === "" && el.children.length === 0) {
          el.remove();
        }
      });
    }

    async function loadArticle() {
      const articleUrl = getParam("url");

      if (!articleUrl) {
        document.getElementById("article").innerHTML =
          '<div class="error">Aucun article indiqué.</div>';
        return;
      }

      try {
        const res = await fetch(articleUrl);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const title =
          doc.querySelector('meta[property="og:title"]')?.content ||
          doc.querySelector("h1")?.innerText ||
          "Article";

        const heroImage =
          doc.querySelector('meta[property="og:image"]')?.content || "";

        let sourceNode =
          doc.querySelector("article") ||
          doc.querySelector("main") ||
          doc.querySelector(".blog-post") ||
          doc.querySelector(".post-content") ||
          doc.body;

        if (!sourceNode) {
          document.getElementById("article").innerHTML =
            '<div class="error">Contenu introuvable.</div>';
          return;
        }

        let contentNode = sourceNode.cloneNode(true);

        removeMetaBlocks(contentNode);
        fixImages(contentNode);
        fixLinks(contentNode);
        styleExternalLinks(contentNode);

        // petit délai pour laisser les onerror s'exécuter avant nettoyage final
        const temp = document.createElement("div");
        temp.appendChild(contentNode);

        setTimeout(() => {
          cleanupEmptyWrappers(temp);

          document.title = title + " – Actus 88";

          document.getElementById("article").innerHTML = `
            <h1>${title}</h1>
            ${heroImage ? `<img class="hero-image" src="${absolutizeUrl(heroImage)}" alt="${title}" onerror="this.classList.add('hidden-broken')">` : ""}
            <div class="content">${temp.innerHTML}</div>
          `;
        }, 300);

      } catch (e) {
        document.getElementById("article").innerHTML =
          '<div class="error">Impossible de charger cet article.</div>';
      }
    }

    loadArticle();
  </script>

</body>
</html>
